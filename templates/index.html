<!DOCTYPE html>
<html>
<head>
<title>EyeTech Pro</title>
<style>
body{margin:0;font-family:system-ui;background:#020617;color:white;text-align:center}
.container{max-width:1000px;margin:auto;padding:20px}
.card{background:#111827;padding:20px;border-radius:15px;margin:10px}
.big{font-size:28px}
input{padding:10px;margin:5px;border-radius:8px;border:none}
button{padding:10px 20px;background:#2563eb;border:none;color:white;border-radius:10px}
</style>
</head>

<body>

<h1>⚡ EyeTech Pro</h1>
<div id="app" class="container"></div>

<script>

let userId = localStorage.getItem("user_id")||"user_"+Math.random();
localStorage.setItem("user_id",userId);

const app=document.getElementById("app");

// SURVEY
function showSurvey(){
app.innerHTML=`
<div class="card">
<input id="price" placeholder="Price per kWh"><br>
<input id="lights" placeholder="Lights"><br>
<input id="tv" placeholder="TV hours"><br>
<input id="fridge" placeholder="Fridges"><br>
<input id="washing" placeholder="Washing/week"><br>
<input id="oven" placeholder="Oven hours"><br>
<input id="ac" placeholder="AC hours"><br>
<button onclick="submit()">Start</button>
</div>`
}

async function submit(){
await fetch("/survey",{method:"POST",headers:{"Content-Type":"application/json"},
body:JSON.stringify({
user_id:userId,
price_per_kwh:+price.value,
lights_count:+lights.value,
tv_hours:+tv.value,
fridge_count:+fridge.value,
washing_per_week:+washing.value,
oven_hours:+oven.value,
ac_hours:+ac.value
})})

localStorage.setItem("survey_done",1);
location.reload();
}

// DASHBOARD
function showDash(){
app.innerHTML=`

<div class="card"><h3>Daily</h3><div id="daily" class="big"></div></div>
<div class="card"><h3>Cost</h3><div id="cost" class="big"></div></div>
<div class="card"><h3>Peak</h3><div id="peak" class="big"></div></div>
<div class="card"><h3>💰 Savings</h3><div id="savings" class="big"></div></div>

<div class="card">
<label><input type="checkbox" onchange="t('lights',this)">Lights</label>
<label><input type="checkbox" onchange="t('tv',this)">TV</label>
<label><input type="checkbox" onchange="t('washing_machine',this)">Washing</label>
<label><input type="checkbox" onchange="t('oven',this)">Oven</label>
<label><input type="checkbox" onchange="t('ac',this)">AC</label>
</div>

<div class="card" id="ins"></div>
<div class="card" id="week"></div>
`

setInterval(load,3000)
}

async function t(d,e){
await fetch("/track",{method:"POST",headers:{"Content-Type":"application/json"},
body:JSON.stringify({user_id:userId,device:d,action:e.checked?"on":"off"})})
}

async function load(){
let r=await fetch("/latest/"+userId)
let d=await r.json()

daily.innerText=d.daily_kwh+" kWh"
cost.innerText="$"+d.monthly_cost
peak.innerText=d.peak_hour||"--"
savings.innerText="$"+d.savings

ins.innerHTML=""
d.insights.forEach(i=>ins.innerHTML+=`<p>${i}</p>`)

week.innerHTML=""
for(let k in d.weekly){
week.innerHTML+=`<p>${k}: ${d.weekly[k].toFixed(2)} kWh</p>`
}
}

if(localStorage.getItem("survey_done")) showDash()
else showSurvey()

</script>
</body>
</html>
