<!DOCTYPE html>
<html>
<head>
  <title>EyeTech Pro</title>
</head>

<body style="
  background: linear-gradient(135deg,#0f172a,#1e293b);
  color:white;
  font-family: system-ui;
  text-align:center;
  padding:20px;
">

<h1>⚡ EyeTech Pro</h1>
<div id="app"></div>

<script>

let userId = localStorage.getItem("user_id") || "user_"+Math.random();
localStorage.setItem("user_id", userId);

const app = document.getElementById("app");

// 🧾 SURVEY
function showSurvey(){
  app.innerHTML = `
    <div style="max-width:400px;margin:auto;background:#111827;padding:20px;border-radius:16px;">
      <h2>Setup Your Home</h2>
      <input id="price" placeholder="Price per kWh"><br><br>
      <input id="lights" placeholder="Lights count"><br><br>
      <button onclick="submit()">Start</button>
    </div>`;
}

async function submit(){
  await fetch("/survey",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({
      user_id:userId,
      price_per_kwh:+price.value,
      lights_count:+lights.value
    })
  });

  localStorage.setItem("survey_done",1);
  location.reload();
}

// 📊 DASHBOARD
function showDash(){
  app.innerHTML = `

  <div style="max-width:900px;margin:auto;">

    <div style="display:flex;gap:15px;flex-wrap:wrap;justify-content:center;">

      <div style="background:#111827;padding:20px;border-radius:16px;width:200px;">
        <h3>⚡ Daily</h3>
        <h2 id="daily"></h2>
      </div>

      <div style="background:#111827;padding:20px;border-radius:16px;width:200px;">
        <h3>💰 Monthly Cost</h3>
        <h2 id="cost"></h2>
      </div>

      <div style="background:#111827;padding:20px;border-radius:16px;width:200px;">
        <h3>📊 Peak Hour</h3>
        <h2 id="peak"></h2>
      </div>

    </div>

    <br>

    <div style="background:#111827;padding:20px;border-radius:16px;">
      <h3>🔌 Devices</h3>

      <label><input type="checkbox" onchange="toggle('lights',this)"> Lights</label><br>
      <label><input type="checkbox" onchange="toggle('tv',this)"> TV</label><br>
      <label><input type="checkbox" onchange="toggle('washing_machine',this)"> Washing Machine</label>
    </div>

    <br>

    <div style="background:#111827;padding:20px;border-radius:16px;">
      <h3>🧠 Insights</h3>
      <div id="ins"></div>
    </div>

    <br>

    <div style="background:#111827;padding:20px;border-radius:16px;">
      <h3>📅 Weekly Usage</h3>
      <div id="week"></div>
    </div>

  </div>
  `;

  setInterval(load,3000);
}

// 🔌 TOGGLE
async function toggle(device, el){

  await fetch("/track",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({
      user_id:userId,
      device:device,
      action: el.checked ? "on":"off"
    })
  });
}

// 🔄 LOAD DATA
async function load(){

  let r = await fetch("/latest/"+userId);
  let d = await r.json();

  document.getElementById("daily").innerText = d.daily_kwh + " kWh";
  document.getElementById("cost").innerText = "$" + d.monthly_cost;
  document.getElementById("peak").innerText = d.peak_hour || "--";

  // insights
  const ins = document.getElementById("ins");
  ins.innerHTML = "";
  d.insights.forEach(i=>{
    ins.innerHTML += `
      <div style="background:#1f2937;padding:10px;margin:6px;border-radius:10px;">
        ${i}
      </div>`;
  });

  // weekly
  const week = document.getElementById("week");
  week.innerHTML = "";

  for(let date in d.weekly){
    week.innerHTML += `
      <div style="margin:5px;">
        ${date}: ${d.weekly[date].toFixed(2)} kWh
      </div>`;
  }
}

// 🚀 INIT
if(localStorage.getItem("survey_done")) showDash();
else showSurvey();

</script>

</body>
</html>
